<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#F4EFE6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#E85D2F" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E85D2F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#0F3D2E" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0F3D2E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="60" height="60" rx="14" fill="#15110D"/>
    <text x="30" y="45" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#FAF7F2" text-anchor="middle">A</text>
    <text x="80" y="42" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#15110D">Ahar<tspan fill="#E85D2F">.</tspan>AI</text>
  </g>

  <g transform="translate(80, 220)">
    <text font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="700" fill="#15110D" letter-spacing="-2">
      <tspan x="0" y="0">The AI restaurant</tspan>
      <tspan x="0" y="84">management software</tspan>
      <tspan x="0" y="168" fill="#E85D2F">that runs your kitchen.</tspan>
    </text>
  </g>

  <g transform="translate(80, 530)">
    <text font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#5C544A">
      POS &middot; Inventory &middot; Demand forecasting &middot; Autonomous AI agents &middot; Built for India
    </text>
  </g>

  <g transform="translate(940, 80)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="#15110D"/>
    <text x="90" y="29" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FAF7F2" text-anchor="middle">ahar.ai</text>
  </g>
